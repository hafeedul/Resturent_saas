{% extends "base.html" %}

{% block content %}
<div class="container mt-8 flex justify-center">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 class="text-center">Create Account</h2>
        <p class="text-center">Start your 14-day free trial today.</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div style="color: var(--color-danger); margin-top: 1rem; text-align: center;">
              {% for message in messages %}
                <p>{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/register" method="POST" style="margin-top: 1.5rem;">
            <div class="form-group">
                <label class="form-label" for="name">Your Name</label>
                <input type="text" id="name" name="name" class="form-input" placeholder="Mario Rossi" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="restaurant_name">Restaurant Name</label>
                <input type="text" id="restaurant_name" name="restaurant_name" class="form-input" placeholder="The Great Eatery" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="manager@restaurant.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        
        <div class="text-center" style="margin-top: 1.5rem;">
            <p class="text-sm">Already have an account? <a href="/login">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
