<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | {{ restaurant.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/stitch.css">
    <link rel="stylesheet" href="/static/css/cheezy.css">
</head>
<body style="background-color: var(--color-background); color: var(--color-text);">
    <nav class="navbar" style="background-color: #000; border-bottom: 2px solid var(--color-primary);">
        <div class="container flex items-center justify-between">
            <h1 class="nav-brand" style="margin: 0;"><a href="/" style="text-decoration: none; color: inherit;">{{ restaurant.name }}</a></h1>
        </div>
    </nav>

    <div class="container mt-8 flex justify-center text-center">
        <div class="card" style="width: 100%; max-width: 600px; padding: 4rem 2rem; background-color: var(--color-surface); border: 1px solid var(--color-border);">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🔥</div>
            <h2 style="color: var(--color-primary);">ORDER CONFIRMED!</h2>
            <p class="text-muted" style="margin-bottom: 2rem; font-size: 1.2rem;">Get ready, {{ order.customer_name }}! Your food is hitting the grill.</p>
            
            <div style="background-color: #121212; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; text-align: left; border: 1px solid #333;">
                <p><strong>Order ID:</strong> <span style="color: #FFF;">#{{ order.id }}</span></p>
                <p><strong>Total:</strong> <span style="color: var(--color-primary); font-weight: bold; font-size: 1.2rem;">${{ "%.2f"|format(order.total_price) }}</span></p>
                <p><strong>Status:</strong> <span class="badge badge-warning" style="font-size: 1rem;">{{ order.status }}</span></p>
            </div>
            
            <a href="/" class="btn btn-primary" style="padding: 1rem 2rem;">RETURN TO MENU</a>
        </div>
    </div>
</body>
</html>
