<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | {{ restaurant.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/stitch.css">
</head>
<body>
    <nav class="navbar" style="background-color: var(--color-surface);">
        <div class="container flex items-center justify-between">
            <h1 style="margin: 0; font-size: 1.5rem; color: var(--color-primary);"><a href="/" style="text-decoration: none; color: inherit;">{{ restaurant.name }}</a></h1>
        </div>
    </nav>

    <div class="container mt-8 flex justify-center text-center">
        <div class="card" style="width: 100%; max-width: 600px; padding: 4rem 2rem;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
            <h2>Order Placed Successfully!</h2>
            <p class="text-muted" style="margin-bottom: 2rem;">Thank you, {{ order.customer_name }}! Your order has been sent to the kitchen.</p>
            
            <div style="background-color: var(--color-background); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; text-align: left;">
                <p><strong>Order ID:</strong> #{{ order.id }}</p>
                <p><strong>Total:</strong> ${{ "%.2f"|format(order.total_price) }}</p>
                <p><strong>Status:</strong> <span style="color: var(--color-primary); font-weight: bold;">{{ order.status }}</span></p>
            </div>
            
            <a href="/" class="btn btn-primary">Return to Menu</a>
        </div>
    </div>
</body>
</html>
