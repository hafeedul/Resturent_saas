<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ restaurant.name }} | Powered by RestoStitch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/stitch.css') }}">
</head>
<body>
    
    <!-- Tenant Navbar (No SaaS login buttons here) -->
    <nav class="navbar" style="background-color: var(--color-surface);">
        <div class="container flex items-center justify-center">
            <h1 style="margin: 0; font-size: 1.5rem; color: var(--color-primary);">{{ restaurant.name }}</h1>
        </div>
    </nav>

    <!-- Tenant Content -->
    <main class="container mt-8">
        <div class="text-center" style="padding: 3rem 0;">
            <h2>{{ restaurant.name }}</h2>
            <p style="font-size: 1.25rem; max-width: 600px; margin: 0 auto;">{{ restaurant.description }}</p>
        </div>

        <div class="card mt-8">
            <h3 class="text-center border-bottom pb-4">Our Menu</h3>
            <p class="text-center text-muted">The menu is currently being updated. Check back soon for our delicious offerings!</p>
        </div>
    </main>

    <footer class="text-center text-muted mt-8 mb-8" style="font-size: 0.875rem;">
        Powered by RestoStitch SaaS
    </footer>
</body>
</html>
