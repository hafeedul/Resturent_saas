<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch SaaS | Restaurant Management</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Our Design System -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/stitch.css') }}">
</head>
<body>
    
    <!-- Top Navigation -->
    <nav class="navbar">
        <div class="container flex items-center justify-between">
            <a href="/" class="nav-brand">RestoStitch</a>
            <div class="nav-links">
                {% if request.path == '/' or request.path == '/login' or request.path == '/register' %}
                    <!-- Public Links -->
                    <a href="/login" class="nav-item">Sign in</a>
                    <a href="/register" class="btn btn-primary">Start Free Trial</a>
                {% else %}
                    <!-- App Links (Logged in) -->
                    <a href="/dashboard" class="nav-item">Dashboard</a>
                    <a href="/" class="nav-item text-sm">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
